<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clinical Summariser</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <h1>AI Clinical Notes Summariser - For Clinical Coding</h1>

    <div class="sample-buttons-container">
        <button class="sample-buttons" type="button" onclick="loadSample(1)">Sample 1</button>
        <button class="sample-buttons" type="button" onclick="loadSample(2)">Sample 2</button>
    </div>

    <p>Enter your clinical summary here or use the sample buttons above for examples:</p>

    <form method="post" onsubmit="{{url_for('main.index')}}">
        <textarea name="notes" id="clinical-text" rows="20"></textarea>

        <div>
            <button id="submit-button" type="submit">Submit</button>
        </div>
    </form>

    {%if response%}
        <h2>Result:</h2>
        <pre id="ai-response">
            {{response}}
        </pre>
    {%endif%}
</body>
</html>

<script>
    function loadSample(sampleNumber) {
        const samples = {
            1: "Patient presented with chest pain, shortness of breath, and dizziness. Developed type 2 respiratory failure requiring CPAP support. Tested positive for COVID-19 via lateral flow test. Chest X-ray revealed consolidations consistent with COVID pneumonia. Significant comorbidities include COPD, type 2 diabetes mellitus, hypertension, and congestive cardiac failure.",

            2: "Patient tripped and fell while in a local retail store. On bringing them to hospital, a hip xray revealed a fractured neck of left femur. As patient has severe pre-existing hip osteoarthritis, a decision to perform a total cemented hip replacement was made. Post op was uneventful and the patient was discharged. Patient is a current smoker, suffers with depression, and has had a previous MI."
        }
        document.querySelector("#clinical-text").value = samples[sampleNumber]
    }
</script>
